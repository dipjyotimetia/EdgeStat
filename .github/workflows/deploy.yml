name: Deploy Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate wrangler.jsonc from secrets
        run: |
          sed \
            -e 's|<YOUR_D1_DATABASE_ID>|${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}|g' \
            -e 's|<YOUR_KV_NAMESPACE_ID>|${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}|g' \
            wrangler.example.jsonc > wrangler.jsonc

      - name: Build schemas
        run: npm run build --workspace packages/schemas

      - name: Build dashboard and SDK
        run: npx turbo run build --filter=edgestat-dashboard --filter=edgestat-sdk

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
