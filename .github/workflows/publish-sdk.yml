name: Publish SDK

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish edgestat-sdk to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build schemas
        run: npm run build --workspace packages/schemas

      - name: Build SDK bundle
        run: npm run build --workspace sdk

      - name: Emit TypeScript declarations
        run: npm run build:types --workspace sdk

      - name: Publish to npm
        run: npm publish --workspace sdk --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
